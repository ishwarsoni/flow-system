# ═══════════════════════════════════════════════════════════════════════════════
#  FLOW Production NGINX Configuration — Final Hardened
#  Reverse proxy → Gunicorn/Uvicorn on 127.0.0.1:8000
#  SSL via Let's Encrypt (certbot)
#
#  PREREQUISITE: Backend (8000), Redis (6379) MUST be bound to 127.0.0.1 only.
#  Only ports 80 and 443 should be open in firewall (UFW).
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
# 10 req/sec sustained, burst 20 (per IP)
limit_req_zone $binary_remote_addr zone=flow_global:10m rate=10r/s;
# Stricter zone for auth endpoints: 5 req/min
limit_req_zone $binary_remote_addr zone=flow_auth:10m rate=5r/m;
# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=flow_conn:10m;

# ── Upstream (Gunicorn with Uvicorn workers) ──────────────────────────────────
upstream flow_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect (mandatory) ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force HTTPS for everything else
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ── SSL Certificates (Let's Encrypt) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN.com/chain.pem;

    # ── Modern SSL Configuration ─────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers (defense in depth — also set in FastAPI) ─────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Hide server identity ─────────────────────────────────────────────
    server_tokens off;

    # ── Request body size limit (1MB — matches FastAPI guard) ────────────
    client_max_body_size 1m;

    # ── Connection limit per IP ──────────────────────────────────────────
    limit_conn flow_conn 20;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/flow_access.log;
    error_log  /var/log/nginx/flow_error.log warn;

    # ── Frontend Static Files ────────────────────────────────────────────
    root /var/www/flow/frontend/dist;
    index index.html;

    # ── Restrict HTTP methods globally ────────────────────────────────────
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── API Proxy → Backend ──────────────────────────────────────────────
    location /api/ {
        # Global rate limit: 10 req/s, burst 20 (tightened from 100)
        limit_req zone=flow_global burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Strip backend identity headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Stricter rate limit for auth endpoints ───────────────────────────
    location /api/auth/login {
        limit_req zone=flow_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/auth/register {
        limit_req zone=flow_auth burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Rate-limited refresh endpoint (prevent token-spray) ──────────────
    location /api/auth/refresh {
        limit_req zone=flow_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Rate-limited logout (prevent blacklist flooding) ─────────────────
    location /api/auth/logout {
        limit_req zone=flow_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Frontend SPA — all non-API routes serve index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        # NOTE: nginx does not inherit parent add_header directives in nested
        # location blocks, so security headers MUST be repeated here.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
            access_log off;
        }
    }

    # ── Block access to hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────
    location = /health {
        proxy_pass http://flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
