# ── Render Blueprint ──────────────────────────────────────────────────────
# Single-service deployment: Backend builds + serves the React frontend.
# This eliminates SPA routing issues (white screen on refresh).

databases:
  - name: flow-db
    plan: free
    databaseName: flow_db
    user: flow_user

services:
  # ── Backend (FastAPI + Frontend SPA) ──────────────────────────────────
  - type: web
    name: flow
    runtime: python
    plan: free
    # No rootDir — use repo root so backend can access frontend/dist
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flow-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: ALLOWED_ORIGINS
        value: '["https://flow-crag.onrender.com","https://flow-rpg.tech","https://www.flow-rpg.tech"]'

  # ── (DISABLED) Separate Frontend Static Site ─────────────────────────
