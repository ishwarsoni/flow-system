# ── Render Blueprint ──────────────────────────────────────────────────────
# Backend: Web Service (flow-crag)
# Frontend: Static Site (flow-system-1)

databases:
  - name: flow-db
    plan: free
    databaseName: flow_db
    user: flow_user

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: flow
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flow-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ALLOWED_ORIGINS
        value: '["https://flow-system-1.onrender.com","https://flow-crag.onrender.com","https://flow-rpg.tech","https://www.flow-rpg.tech"]'

  # ── Frontend (React SPA) ────────────────────────────────────────────
  - type: web
    name: flow-system-1
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://flow-crag.onrender.com/api
