# ── Render Blueprint ──────────────────────────────────────────────────────
# Deploy with: https://render.com/deploy
# Single service: backend (FastAPI) serves the built React frontend.

databases:
  - name: flow-db
    plan: free
    databaseName: flow_db
    user: flow_user

services:
  - type: web
    name: flow-rpg
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flow-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "18.19.0"
      - key: ALLOWED_ORIGINS
        value: "https://flow-rpg.onrender.com"
