# ── Render Blueprint ──────────────────────────────────────────────────────
# Deploy with: https://render.com/deploy
# This file tells Render how to build & run the FLOW backend.

databases:
  - name: flow-db
    plan: free
    databaseName: flow_db
    user: flow_user

services:
  - type: web
    name: flow-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flow-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"
