<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#02050f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FLOW — System Interface</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #02050f;
      color: #b8d8f0;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #root { width: 100%; min-height: 100vh; background-color: #02050f; }
    *, *::before, *::after { box-sizing: border-box; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #flow-preloader {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; background: #02050f; gap: 12px;
    }
    #flow-preloader .sp {
      width: 28px; height: 28px; border: 2px solid rgba(0,212,255,0.2);
      border-top: 2px solid #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #flow-preloader .lb {
      font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 3px;
      color: rgba(0,212,255,0.4);
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="flow-preloader"><div class="sp"></div><span class="lb">INITIALIZING...</span></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
